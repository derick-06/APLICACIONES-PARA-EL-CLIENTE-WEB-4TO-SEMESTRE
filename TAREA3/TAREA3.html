<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<div class="icono">📖</div>
<div>     
    <h1>Sistema de Registro de Clientes</h1>
    <h2>Ingreso de datos</h2>
</div> 
</header>

<section class="contenedor">
<h2>Datos del Cliente</h2>
<div class="campo">
    <label for="cedula">Cédula</label>
<input type="text" id="cedula" name="cedula" placeholder="1311223412" maxlength="10">
</div>

<div class="campo">
    <label for="nombre">Nombre</label>
<input type="text" id="nombre" name="nombre" placeholder="Marcos">
</div>

<div class="campo">
    <label for="direccion">Dirección</label>
<input type="text" id="direccion" name="direccion" placeholder="Calle 11">
</div>

<div class="campo">
    <label for="telefono">Teléfono</label>
<input type="text" id="telefono" name="telefono" placeholder="0991519155">
</div>

<div class="campo">
    <label for="correo">Correo</label>
<input type="text" id="correo" name="correo" placeholder="ejemplo@gmail.com">
</div>

<div class="botones">
<button class="btn guardar">Guardar</button>
<button class="btn limpiar" type="reset">Limpiar</button>
</div>
</section>
</body>
</html>
